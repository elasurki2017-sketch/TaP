/* =========================

function generateId(){
    return "ID_" + Date.now();
}

function formatRupiah(value){
    value = String(value).replace(/\D/g,"");
    if(value==="") return "";
    return "Rp " +
    Number(value).toLocaleString("id-ID");
}

function parseRupiah(value){
    return Number(
        String(value)
        .replace(/[^\d]/g,"") || 0
    );
}

function extractDate(dateFull){

    if(!dateFull) return "";

    let d = new Date(dateFull);

    if(isNaN(d)){
        return "";
    }

    return d.getDate();

}

function fetchSpreadsheetData(){



    return new Promise((resolve,reject)=>{

        const callback = "cb_" + Date.now();
        const script = document.createElement("script");

        window[callback] = function(data){

            tableData = data;
            applyPeriodFilter();

            if (script.parentNode){
                script.parentNode.removeChild(script);
            }

            delete window[callback];

            resolve();
        };

        script.src = API_URL + "?callback=" + callback;

        script.onerror = function(){

            if (script.parentNode){
                script.parentNode.removeChild(script);
            }

            delete window[callback];

            alert("Gagal mengambil data");

            reject();
        };

        document.head.appendChild(script);

    });

}

/* =========================
PERIOD FILTER
========================= */

function applyPeriodFilter(){

    let month = monthSelect.value;
    let year = yearSelect.value;

    if(!month || !year){

        renderTable();
        return;
    }

    const bulanMap = {

        Januari:1,
        Februari:2,
        Maret:3,
        April:4,
        Mei:5,
        Juni:6,
        Juli:7,
        Agustus:8,
        September:9,
        Oktober:10,
        November:11,
        Desember:12

    };

    let filtered =
    tableData.filter(item=>{

        let d =
        new Date(item.dateFull);

        let m =
        d.getMonth() + 1;

        let y =
        d.getFullYear();

        return (
            m===bulanMap[month]
            &&
            y===Number(year)
        );

    });

    renderTable(filtered);

}

async function sendApi(data){

    try{

        const form = new FormData();
        form.append("data", JSON.stringify(data));

        const res = await fetch(API_URL,{
            method:"POST",
            body:form
        });

        const json = await res.json();

        if(json.status){
            return true;
        }

        alert(json.error || "Gagal menyimpan data");
        return false;

    }catch(err){

        alert("Error : " + err.message);
        return false;

    }

}

    let total = 0;

    data.forEach(item=>{

        total += Number(item.flazz || 0);
        total += Number(item.cash || 0);

    });

    subtotalValue.textContent =
        "Rp " + total.toLocaleString("id-ID");

}

========================= */

function renderTable(data = tableData){

    if(data.length===0){

    tableBody.innerHTML = `

    <tr id="placeholderRow">

        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="hidden-datefull">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>

        <td class="action-cell">

            <button
                onclick="openFirstAdd()"
                class="action-btn">✏️</button>

        </td>

    </tr>`;

    updateSubtotal([]);

    return;
}
    data.sort((a,b)=>
        new Date(a.dateFull)
        -
        new Date(b.dateFull)
    );

    let grouped = {};
    let dateTotals = {};
    let html = "";

    data.forEach((row,index)=>{

        if(!grouped[row.dateFull]){
            grouped[row.dateFull] = [];
        }

        grouped[row.dateFull].push({
            ...row,
            index:index
        });

    });



    Object.keys(grouped)
    .forEach(dateKey=>{

        let total = 0;

        grouped[dateKey]
        .forEach(row=>{

            total +=
            Number(row.flazz || 0);

            total +=
            Number(row.cash || 0);

        });

        dateTotals[dateKey] = total;

    });

    Object.keys(grouped)
.forEach((dateKey, groupIndex)=>{

    let rows = grouped[dateKey];

    // warna selang-seling per tanggal
    let rowClass =
    groupIndex % 2 === 0
    ? "group-even"
    : "group-odd";

    rows.forEach((row,rowIndex)=>{

            let nomor = rowIndex + 1;

            html += `<tr class="${rowClass}">`;

            if(rowIndex===0){

                html += `
                <td class="date-cell"
                    rowspan="${rows.length}">
                    ${extractDate(row.dateFull)}
                </td>`;

            }

            html += `
            <td class="no-cell">${nomor}</td>
            `;

            if(rowIndex===0){

                html += `
                <td class="hidden-datefull"
                    rowspan="${rows.length}">
                    ${row.dateFull}
                </td>`;

            }

            html += `

<td class="center-cell">${row.start}</td>
<td class="center-cell">${row.arrive}</td>
<td class="center-cell">${row.parking}</td>

<td class="money-cell">
${row.flazz===0 ? "" : formatRupiah(row.flazz)}
</td>

<td class="money-cell">
${row.cash===0 ? "" : formatRupiah(row.cash)}
</td>

<td class="center-cell">${row.km}</td>

`;

/* ===== LANJUTAN renderTable() ===== */

            html += `

${rowIndex===0 ? `
<td class="total-cell"
    rowspan="${rows.length}">
${dateTotals[row.dateFull]===0
? ""
: formatRupiah(dateTotals[row.dateFull])}
</td>
` : ""}

<td class="action-cell">

<div class="action-wrap">

<button onclick="editRow('${row.id}')"
        class="action-btn">✏️</button>

<button onclick="askDelete('${row.id}')"
        class="action-btn">🗑️</button>

<button onclick="addNewRow('${row.id}')"
        class="action-btn">➕</button>

</div>

</td>
`;

        });

    });

    tableBody.innerHTML = html;

    updateSubtotal(data);

}

function validateForm(){

    let lokasi =
    inputStart.value.trim() ||
    inputArrive.value.trim() ||
    inputParking.value.trim();

    let biaya =
    parseRupiah(inputFlazz.value) ||
    parseRupiah(inputCash.value);

    if(!inputDateFull.value){
        alert("Date wajib diisi");
        return false;
    }

        alert("Isi Start / Arrive / Parking");
        return false;

        return false;

saveRowBtn.onclick = async ()=>{

    if(!validateProfilePeriod()) return;
    if(!validateForm()) return;
    
    saveLastPeriod();

    let confirmSave =
    confirm("Data sudah benar?");

    if(!confirmSave) return;

    let flazzRaw = parseRupiah(inputFlazz.value);
let cashRaw  = parseRupiah(inputCash.value);

let flazz = flazzRaw === 0 ? "" : flazzRaw;
let cash  = cashRaw === 0 ? "" : cashRaw;

    let data = {

        id:
        editIndex
        ?
        editIndex
        :
        generateId(),

        dateFull:
        inputDateFull.value,

        start:
        inputStart.value,

        arrive:
        inputArrive.value,

        parking:
        inputParking.value,

        flazz: flazz,
        cash: cash,
        km: inputKm.value

    };


    /* UPDATE */

    if(editIndex){

        data.action = "update";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    /* ADD */

    else{

        data.action = "add";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    clearForm();

    closeModal(formModal);

};


/* =========================

window.editRow = function(id){

    let row =
    tableData.find(
        x => x.id === id
    );

    if(!row) return;

    editIndex = id;

    inputDateFull.value =
    row.dateFull;

    inputStart.value =
    row.start;

    inputArrive.value =
    row.arrive;

    inputParking.value =
    row.parking;

    inputFlazz.value =
    formatRupiah(row.flazz);

    inputCash.value =
    formatRupiah(row.cash);

    inputKm.value =
    row.km;

    openModal(formModal);

}

        "TOTAL HIGHWAY PARKING EXPENSE SUMMARY",
        PAGE_WIDTH/2,
        y,
        {align:"center"}
    );

    /* ================= PROFILE ================= */

y += 5;

let profileData = [

    ["Name",
    localStorage.getItem("employeeName") || ""],

    ["User",
    localStorage.getItem("employeeUser") || ""],

    ["Car Number",
    localStorage.getItem("employeeCar") || ""],

    ["Period",
    monthSelect.value + " " + yearSelect.value]

];

let profileY = y;
let labelWidth = 35;
let valueWidth = 50;
let rowH = 5;

/* reset font */
doc.setFont("helvetica","normal");
doc.setFontSize(8);

profileData.forEach((row)=>{

    doc.rect(leftMargin, profileY, labelWidth, rowH);
    doc.rect(leftMargin + labelWidth, profileY, valueWidth, rowH);

    const textY = profileY + (rowH / 2) + 1.2;

    doc.text(
        String(row[0]),
        leftMargin + 2,
        textY
    );

    doc.text(
        String(row[1]),
        leftMargin + labelWidth + 2,
        textY
    );

    profileY += rowH;
});

y = profileY + 4;

    /* ================= FILTER ================= */

let filtered = [...tableData];

const bulanMap = {
    Januari:1,
    Februari:2,
    Maret:3,
    April:4,
    Mei:5,
    Juni:6,
    Juli:7,
    Agustus:8,
    September:9,
    Oktober:10,
    November:11,
    Desember:12
};

filtered = filtered.filter(item=>{

    let d = new Date(item.dateFull);

    return (
        d.getMonth()+1 === bulanMap[monthSelect.value] &&
        d.getFullYear() === Number(yearSelect.value)
    );

});

if(filtered.length===0){
    alert("Tidak ada data");
    return;
}

filtered.sort((a,b)=>
    new Date(a.dateFull) -
    new Date(b.dateFull)
);

/* ================= REKAP ================= */

let rekap = {};

filtered.forEach(item=>{

    if(!rekap[item.dateFull]){

        rekap[item.dateFull] = {
            expense:0
        };

    }

    rekap[item.dateFull].expense +=
        Number(item.cash || 0) +
        Number(item.flazz || 0);

});

/* ================= TABLE ================= */

const widths = [
    18, // Date
    30, // Cash In
    36, // Expense
    58, // Daily Activity
    44  // Remark
];
// Total = 186 mm

const rowHeight = 6;



const startX = leftMargin;

const tableWidth =
PAGE_WIDTH - leftMargin - rightMargin;

const tableRight = startX + tableWidth;

const headers = [

    "Date",
    "Cash In",
    "Expense",
    "Daily Activity",
    "Keterangan"

];

function drawHeader() {

    let x = startX;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);

    headers.forEach((h, i) => {

        doc.setFillColor(255, 255, 0);

        doc.rect(
            x,
            y,
            widths[i],
            rowHeight,
            "FD"
        );

        doc.text(
            h,
            x + (widths[i] / 2),
            y + (rowHeight / 2) + 0.5,
            {
                align: "center",
                baseline: "middle"
            }
        );

        x += widths[i];
    });

    y += rowHeight;

}

/* gambar header */

drawHeader();

/* ================= BODY ================= */

let subtotal = 0;

const bulan = bulanMap[monthSelect.value];
const tahun = Number(yearSelect.value);

const jumlahHari = new Date(tahun, bulan, 0).getDate();

for(let tgl = 1; tgl <= jumlahHari; tgl++){

    const dateKey =
        `${tahun}-${String(bulan).padStart(2,"0")}-${String(tgl).padStart(2,"0")}`;

   const item = rekap[dateKey] || {
    expense: 0
};

subtotal += item.expense;

let x = startX;

const cells = [
    tgl,
    "",
    item.expense ? formatRupiah(item.expense) : "-",
    "",
    ""
];

cells.forEach((cell,i)=>{

    /* warna selang-seling */
    if(tgl % 2 === 0){
        doc.setFillColor(229,231,235); // abu-abu
    }else{
        doc.setFillColor(255,255,255); // putih
    }

    doc.rect(
        x,
        y,
        widths[i],
        rowHeight,
        "FD"          // Fill + Draw
    );

    if(i===2){

        doc.text(
            String(cell),
            x + widths[i] - 2,
            y + 4,
            {align:"right"}
        );

    }else{

        doc.text(
            String(cell),
            x + widths[i]/2,
            y + 4,
            {align:"center"}
        );

    }

    x += widths[i];

});

y += rowHeight;

}



    /* ================= SUB TOTAL ================= */

/* posisi tanggal tanda tangan */
const signY = y + 10;

/* posisi area tanda tangan */
const signWidth = 50;
const sigStartX = tableRight - signWidth;
const sigCenter = sigStartX + (signWidth / 2);

/* tanggal PDF */
const today = new Date();

const namaBulan = [
    "Januari",
    "Februari",
    "Maret",
    "April",
    "Mei",
    "Juni",
    "Juli",
    "Agustus",
    "September",
    "Oktober",
    "November",
    "Desember"
];

const tanggal =
    today.getDate() + " " +
    namaBulan[today.getMonth()] + " " +
    today.getFullYear();

/* ================= SUB TOTAL ================= */

const subLabelWidth = widths[0] + widths[1];
const subValueWidth = widths[2];

doc.setFont("helvetica","bold");
doc.setFontSize(10);

/* kotak SUB TOTAL */
doc.rect(
    startX,
    y,
    subLabelWidth,
    rowHeight
);

doc.text(
    "SUB TOTAL",
    startX + subLabelWidth / 2,
    y + 4,
    { align: "center" }
);

/* kotak nominal subtotal */
doc.rect(
    startX + subLabelWidth,
    y,
    subValueWidth,
    rowHeight
);

doc.text(
    formatRupiah(subtotal),
    startX + subLabelWidth + subValueWidth - 2,
    y + 4,
    { align: "right" }
);

y += 20;
    doc.text("*Total Highway Parking Suspense Rp. 3.000.000", leftMargin, y);

/* ================= SIGNATURE ================= */

/* tanggal sejajar dengan subtotal */
doc.setFont("helvetica","normal");
doc.setFontSize(9);

doc.text(
    "Jakarta, " + tanggal,
    sigCenter,
    signY,
    { align:"center" }
);

/* garis tanda tangan */
doc.line(
    sigStartX,
    signY + 20,
    tableRight,
    signY + 20
);

/* nama */
doc.text(
    localStorage.getItem("employeeName") || "",
    sigCenter,
    signY + 24,
    { align:"center" }
);


// ================= PAGE NUMBER =================

const totalPages = doc.getNumberOfPages();

for(let i = 1; i <= totalPages; i++){

    doc.setPage(i);

    doc.setFont("helvetica","normal");
    doc.setFontSize(9);

    // posisi bawah tengah
    doc.text(
        i + "/" + totalPages,
        PAGE_WIDTH / 2,
        PAGE_HEIGHT - 5,
        {align:"center"}
    );
}
    /* ================= SAVE ================= */

    let fileName =
"Rekap_Toll_Parkir_" +
monthSelect.value +
"_" +
yearSelect.value +
".pdf";

    doc.save(fileName);
}

    // bind button setelah HTML siap
    
    document.getElementById("exportPdfBtn")
.onclick = exportPDF;

document.getElementById("exportRekapBtn").onclick =
    exportRekapPDF;

    .onclick = ()=>{

        if(profileLocked){
            setProfileLock(false);
            return;
        }

        saveProfile();
        closeModal(profileModal);
    };

    document.getElementById("profileBtn")
    .onclick = ()=>{
        loadProfile();
        openModal(profileModal);
    };

    document.getElementById("closeProfileBtn")
    .onclick = ()=>{
        closeModal(profileModal);
    };

    loadProfile();
    loadLastPeriod();
    await fetchSpreadsheetData();
    applyPeriodFilter();
};
