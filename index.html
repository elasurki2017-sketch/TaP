<script>

/* =========================
CONFIG
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbyAgSIBPIhjcfFFIFRfa4U6nMBqbiyVriW-VfG66Rwn6e_-X41PAJtoGVMbHaKErOheMw/exec";


/* =========================
STATE
========================= */

let tableData = [];
let editIndex = null;
let deleteIndex = null;
let addBelowIndex = null;
let profileLocked = false;


/* =========================
ELEMENTS
========================= */

const tableBody = document.getElementById("tableBody");
const subtotalValue = document.getElementById("subtotalValue");

const formModal = document.getElementById("formModal");
const profileModal = document.getElementById("profileModal");
const deleteConfirmModal = document.getElementById("deleteConfirmModal");


const cancelFormBtn = document.getElementById("cancelFormBtn");

const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");

const profileNameDisplay = document.getElementById("profileNameDisplay");

const inputDateFull = document.getElementById("inputDateFull");

/* =========================
MODAL
========================= */

function openModal(modal){
    modal.style.display = "flex";
}

function closeModal(modal){

}

    clearForm();

    openModal(formModal);

/* =========================
HELPERS
========================= */

function generateId(){
    return "ID_" + Date.now();
}

function formatRupiah(value){
    value = String(value).replace(/\D/g,"");
    if(value==="") return "";
    return "Rp " +
    Number(value).toLocaleString("id-ID");
}

function parseRupiah(value){
    return Number(
        String(value)
        .replace(/[^\d]/g,"") || 0
    );
}

function extractDate(dateFull){

    if(!dateFull) return "";

    let d = new Date(dateFull);

    if(isNaN(d)){
        return "";
    }

    return d.getDate();

}
/* =========================
SAVE LAST PERIOD
========================= */

function saveLastPeriod(){

    localStorage.setItem(
        "lastMonth",
        monthSelect.value
    );

    localStorage.setItem(
        "lastYear",
        yearSelect.value
    );

}

function loadLastPeriod(){

    let lastMonth =
    localStorage.getItem("lastMonth");

    let lastYear =
    localStorage.getItem("lastYear");

    if(lastMonth){
        monthSelect.value = lastMonth;
    }

    if(lastYear){
        yearSelect.value = lastYear;
    }

}

INPUT FORMAT
========================= */

inputFlazz.addEventListener("input",()=>{

inputCash.addEventListener("input",()=>{

/* =========================
API FUNCTIONS
========================= */

async function fetchSpreadsheetData(){

    try{

        const response =
        await fetch(API_URL);

        const data =
        await response.json();

        tableData = data;
        // console.log(data);
        applyPeriodFilter();

    }catch(error){

        console.log(error);

        alert("Gagal mengambil data spreadsheet");

    }

}


async function sendApi(data){

    try{

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify(data)

        });

        return true;

    }catch(error){

        console.log(error);

        alert("Koneksi gagal");

        return false;

    }

}


/* =========================
PERIOD FILTER
========================= */

function applyPeriodFilter(){

    let month = monthSelect.value;
    let year = yearSelect.value;

    if(!month || !year){

        renderTable();
        return;
    }

    const bulanMap = {

        Januari:1,
        Februari:2,
        Maret:3,
        April:4,
        Mei:5,
        Juni:6,
        Juli:7,
        Agustus:8,
        September:9,
        Oktober:10,
        November:11,
        Desember:12

    };

    let filtered =
    tableData.filter(item=>{

        let d =
        new Date(item.dateFull);

        let m =
        d.getMonth() + 1;

        let y =
        d.getFullYear();

        return (
            m===bulanMap[month]
            &&
            y===Number(year)
        );

    });

    renderTable(filtered);

}


/* =========================
SUBTOTAL
========================= */

function updateSubtotal(data){

    let total = 0;

    data.forEach(item=>{

        total += Number(item.total);

    });

    subtotalValue.textContent =
    "Rp " +
    total.toLocaleString("id-ID");

}


/* =========================
RENDER TABLE
========================= */

function renderTable(data = tableData){

    if(data.length===0){

    tableBody.innerHTML = `

    <tr id="placeholderRow">

        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="hidden-datefull">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>

        <td class="action-cell">

            <button
                onclick="openFirstAdd()"
                class="action-btn">✏️</button>

        </td>

    </tr>`;

    updateSubtotal([]);

    return;
}
    data.sort((a,b)=>
        new Date(a.dateFull)
        -
        new Date(b.dateFull)
    );

    let grouped = {};
    let dateTotals = {};
    let html = "";

    data.forEach((row,index)=>{

        if(!grouped[row.dateFull]){
            grouped[row.dateFull] = [];
        }

        grouped[row.dateFull].push({
            ...row,
            index:index
        });

    });

    Object.keys(grouped)
    .forEach(dateKey=>{

        let total = 0;

        grouped[dateKey]
        .forEach(row=>{

            total +=
            Number(row.flazz || 0);

            total +=
            Number(row.cash || 0);

        });

        dateTotals[dateKey] = total;

    });

    Object.keys(grouped)
.forEach((dateKey, groupIndex)=>{

    let rows = grouped[dateKey];

    // warna selang-seling per tanggal
    let rowClass =
    groupIndex % 2 === 0
    ? "group-even"
    : "group-odd";

    rows.forEach((row,rowIndex)=>{

            let nomor = rowIndex + 1;

            html += `<tr class="${rowClass}">`;

            if(rowIndex===0){

                html += `
                <td class="date-cell"
                    rowspan="${rows.length}">
                    ${extractDate(row.dateFull)}
                </td>`;

            }

            html += `
            <td class="no-cell">${nomor}</td>
            `;

            if(rowIndex===0){

                html += `
                <td class="hidden-datefull"
                    rowspan="${rows.length}">
                    ${row.dateFull}
                </td>`;

            }

            html += `

<td class="center-cell">${row.start}</td>
<td class="center-cell">${row.arrive}</td>
<td class="center-cell">${row.parking}</td>

<td class="money-cell">
${row.flazz===0 ? "" : formatRupiah(row.flazz)}
</td>

<td class="money-cell">
${row.cash===0 ? "" : formatRupiah(row.cash)}
</td>

<td class="center-cell">${row.km}</td>

`;

/* ===== LANJUTAN renderTable() ===== */

            html += `

${rowIndex===0 ? `
<td class="total-cell"
    rowspan="${rows.length}">
${dateTotals[row.dateFull]===0
? ""
: formatRupiah(dateTotals[row.dateFull])}
</td>
` : ""}

<td class="action-cell">

<div class="action-wrap">

<button onclick="editRow('${row.id}')"
        class="action-btn">✏️</button>

<button onclick="askDelete('${row.id}')"
        class="action-btn">🗑️</button>

<button onclick="addNewRow('${row.id}')"
        class="action-btn">➕</button>

</div>

</td>
`;

        });

    });

    tableBody.innerHTML = html;

    updateSubtotal(data);

}


/* =========================
FORM HELPERS
========================= */

function clearForm(){

    inputDateFull.value = "";
    inputStart.value = "";
    inputArrive.value = "";
    inputParking.value = "";
    inputFlazz.value = "";
    inputCash.value = "";
    inputKm.value = "";

    editIndex = null;
    addBelowIndex = null;

}


function validateForm(){

    let lokasi =
    inputStart.value.trim() ||
    inputArrive.value.trim() ||
    inputParking.value.trim();

    let biaya =
    parseRupiah(inputFlazz.value) ||
    parseRupiah(inputCash.value);

    if(!inputDateFull.value){
        alert("Date wajib diisi");
        return false;
    }

    if(!lokasi){
        alert("Isi Start / Arrive / Parking");
        return false;
    }

    if(!biaya){
        alert("Isi Flazz / Cash");
        return false;
    }

    return true;

}


/* =========================
SAVE ROW
========================= */

saveRowBtn.onclick = async ()=>{

    if(!validateProfilePeriod()) return;
    if(!validateForm()) return;
    
    saveLastPeriod();

    let confirmSave =
    confirm("Data sudah benar?");

    if(!confirmSave) return;

    let flazz =
    parseRupiah(inputFlazz.value);

    let cash =
    parseRupiah(inputCash.value);

    let data = {

        id:
        editIndex
        ?
        editIndex
        :
        generateId(),

        dateFull:
        inputDateFull.value,

        start:
        inputStart.value,

        arrive:
        inputArrive.value,

        parking:
        inputParking.value,

        flazz: flazz,
        cash: cash,
        km: inputKm.value

    };


    /* UPDATE */

    if(editIndex){

        data.action = "update";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    /* ADD */

    else{

        data.action = "add";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    clearForm();

    closeModal(formModal);

};


/* =========================
EDIT
========================= */

window.editRow = function(id){

    let row =
    tableData.find(
        x => x.id === id
    );

    if(!row) return;

    editIndex = id;

    inputDateFull.value =
    row.dateFull;

    inputStart.value =
    row.start;

    inputArrive.value =
    row.arrive;

    inputParking.value =
    row.parking;

    inputFlazz.value =
    formatRupiah(row.flazz);

    inputCash.value =
    formatRupiah(row.cash);

    inputKm.value =
    row.km;

    openModal(formModal);

}


/* =========================
ADD BELOW
========================= */

window.addNewRow = function(id){

    clearForm();

    editIndex = null;
    addBelowIndex = id;

    openModal(formModal);

}


/* =========================
DELETE
========================= */

window.askDelete = function(id){

    deleteIndex = id;

    openModal(deleteConfirmModal);

}


confirmDeleteBtn.onclick =
async ()=>{

    if(!deleteIndex) return;

    let ok =
    await sendApi({

        action:"delete",
        id:deleteIndex

    });

    if(ok){

        await fetchSpreadsheetData();

    }

    deleteIndex = null;

    closeModal(
        deleteConfirmModal
    );

}


cancelDeleteBtn.onclick = ()=>{

    closeModal(
        deleteConfirmModal
    );

}

    document.getElementById(
    "employeeNik").readOnly = lock;

    document.getElementById(
    "employeeUser").readOnly = lock;

    document.getElementById(
    "employeeLocation").readOnly = lock;

    saveProfileBtn.textContent =

}


function saveProfile(){

    let name =

    "employeeName").value.trim();

    let nik =
    document.getElementById(
    "employeeNik").value.trim();

    let user =
    document.getElementById(
    "employeeUser").value.trim();

    let car =
    document.getElementById(
    "employeeLocation").value.trim();

    localStorage.setItem(

    let user =

    "employeeUser") || "";

    document.getElementById(
    "employeeNik").value = nik;

    document.getElementById(

/* =========================
EXPORT PDF
========================= */

async function exportPDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p","mm","a4");

    const PAGE_WIDTH = 210;
    const PAGE_HEIGHT = 297;

    const leftMargin = 12;
    let y = 15;

    /* ================= VALIDATE ================= */

    if(!monthSelect.value || !yearSelect.value){
        alert("Pilih period terlebih dahulu");
        return;
    }

    /* ================= HEADER ================= */

    doc.setFont("helvetica","bold");

    y += 5;

    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.text("General Affair Division Head", leftMargin, y);

    y += 4;
    doc.text("Department Head", leftMargin, y);

    /* ================= TITLE ================= */

    y += 12;

    doc.setFont("helvetica","bold");
    doc.setFontSize(13);

    doc.text(
        "DETAILED TOLL AND PARKING EXPENSE REPORT",
        PAGE_WIDTH/2,
        y,
        {align:"center"}
    );

    /* ================= PROFILE ================= */

y += 10;

let profileData = [

    ["Name",
    localStorage.getItem("employeeName") || ""],

    ["NIK",
    localStorage.getItem("employeeNik") || ""],

    ["User",
    localStorage.getItem("employeeUser") || ""],

    ["Car Number",
    localStorage.getItem("employeeCar") || ""],

    ["Period",

];

let profileY = y;
let labelWidth = 35;
let valueWidth = 80;
let rowH = 7;

/* reset font */

doc.setFontSize(9);

profileData.forEach((row)=>{

        String(row[0]),
        leftMargin + 2,
        profileY + 4.5
    );

    doc.text(
        String(row[1]),
        leftMargin + labelWidth + 2,
        profileY + 4.5
    );

    profileY += rowH;
});

y = profileY + 8;

    /* ================= FILTER ================= */

    let filtered = [...tableData];

    const bulanMap = {
        Januari:1,
        Februari:2,
        Maret:3,
        April:4,
        Mei:5,
        Juni:6,
        Juli:7,
        Agustus:8,
        September:9,
        Oktober:10,
        November:11,
        Desember:12
    };

    filtered = filtered.filter(item=>{

        let d = new Date(item.dateFull);

        return (
            d.getMonth()+1 === bulanMap[monthSelect.value]
            &&
            d.getFullYear() === Number(yearSelect.value)
        );

    });

    if(filtered.length===0){
        alert("Tidak ada data");
        return;
    }

    filtered.sort((a,b)=>
        new Date(a.dateFull) -
        new Date(b.dateFull)
    );

    /* ================= GROUP ================= */

    let grouped = {};

    filtered.forEach(row=>{

        if(!grouped[row.dateFull]){
            grouped[row.dateFull] = [];
        }

        grouped[row.dateFull].push(row);

    });

    /* ================= TABLE CONFIG ================= */

    const widths = [

        12,   // Date
        10,   // No
        36,   // Start
        36,   // Arrive
        36,   // Parking
        18,   // Flazz
        18,   // Cash
        20    // Total

    ];

    const rowHeight = 8;

    const tableWidth =
    widths.reduce((a,b)=>a+b,0);

    const startX =
    (PAGE_WIDTH - tableWidth)/2;

    const headers = [

        "Date",
        "No",
        "Start",
        "Arrive",
        "Parking",
        "Flazz",
        "Cash",
        "Total"

    ];

    function drawHeader(){

    let x = startX;

    doc.setFont("helvetica","bold");
    doc.setFontSize(7);

    headers.forEach((h,i)=>{

        // background abu-abu
        doc.setFillColor(209,213,219);   // sama seperti CSS #D1D5DB

        // kotak header dengan fill
        doc.rect(
            x,
            y,
            widths[i],
            rowHeight,
            "FD"     // Fill + Draw
        );

        // warna text hitam
        doc.setTextColor(0,0,0);

        doc.text(
            h,
            x + widths[i]/2,
            y + 5,
            {align:"center"}
        );

        x += widths[i];
    });

    y += rowHeight;
}

    drawHeader();

    /* ================= BODY ================= */

    let subtotal = 0;

    Object.keys(grouped).forEach(dateKey=>{

        let rows = grouped[dateKey];

        let totalDate = 0;

        rows.forEach(r=>{

            totalDate += Number(r.flazz || 0);
            totalDate += Number(r.cash || 0);

        });

        subtotal += totalDate;

        let blockHeight =
        (rows.length + 1) * rowHeight;

        /* PAGE BREAK */

        if(
            y + blockHeight >
            PAGE_HEIGHT - 40
        ){

            doc.addPage();
            y = 15;
            drawHeader();
        }

        /* DATE MERGE */

        doc.rect(
            startX,
            y,
            widths[0],
            blockHeight
        );

        doc.setFont("helvetica","bold");
doc.setFontSize(12);   // perbesar ukuran date

doc.text(

    String(extractDate(dateKey)),

    startX + widths[0]/2,

    y + (blockHeight/2) + 1,   // sedikit turun biar center visual

    {align:"center"}

);

// kembalikan size normal untuk tabel berikutnya
doc.setFontSize(7);
doc.setFont("helvetica","normal");

/* TOTAL COLUMN MERGE (kosong seperti DATE) */

let totalColumnX =
startX +
widths[0] +   // Date
widths[1] +   // No
widths[2] +   // Start
widths[3] +   // Arrive
widths[4] +   // Parking
widths[5] +   // Flazz
widths[6];    // Cash

/* buat merge vertikal kolom total */

doc.rect(

    totalColumnX,

    y,

    widths[7],

    rows.length * rowHeight

);

        /* ROWS */

        rows.forEach((r,index)=>{

            let rowY =
            y + (index*rowHeight);

            let x =
            startX + widths[0];

            let cells = [

                index+1,

                r.arrive || "",

                r.parking || "",

                r.flazz
                ? formatRupiah(r.flazz)
                : "",

                r.cash
                ? formatRupiah(r.cash)
                : ""

            ];

            let cellWidths = [

                widths[1],
                widths[2],
                widths[3],
                widths[4],
                widths[5],
                widths[6]

            ];

            cells.forEach((cell,i)=>{

    doc.rect(
        x,
        rowY,
        cellWidths[i],
        rowHeight,
        "S"
    );

    if(i >= 4){

        doc.text(
            String(cell),
            x + cellWidths[i] - 1.5,
            rowY + 5,

        );

    }else{

        doc.text(
            String(cell),
            x + cellWidths[i]/2,
            rowY + 5,
            {align:"center"}
        );

    }

    x += cellWidths[i];
});


        });

        /* TOTAL */

        let totalY =
        y + rows.length * rowHeight;

        let mergeX =
        startX + widths[0];

        let mergeWidth =

        widths[1] +
        widths[2] +
        widths[3] +
        widths[4] +
        widths[5] +

        doc.rect(

        );

            "TOTAL",

            {align:"center"}

        );

        mergeX + mergeWidth;

        doc.rect(
            totalX,
            totalY,
            widths[7],
            rowHeight
        );

        doc.text(

            formatRupiah(totalDate),

    });

    /* ================= SUBTOTAL ================= */

y += 10;

if(y > PAGE_HEIGHT - 40){

}

/* align kanan mengikuti tabel data */

/* ================= SIGNATURE ================= */

y += 25;

/* garis berakhir tepat di kanan tabel */
let sigStartX =
tableRight - signWidth;

sigStartX + (signWidth / 2);
