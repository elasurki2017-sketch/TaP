/* =========================
RESET

<script>

/* =========================
CONFIG
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbyAgSIBPIhjcfFFIFRfa4U6nMBqbiyVriW-VfG66Rwn6e_-X41PAJtoGVMbHaKErOheMw/exec";


/* =========================
STATE
========================= */

let tableData = [];
let editIndex = null;
let deleteIndex = null;
let addBelowIndex = null;
let profileLocked = false;


/* =========================
ELEMENTS
========================= */

const tableBody = document.getElementById("tableBody");
const subtotalValue = document.getElementById("subtotalValue");

const formModal = document.getElementById("formModal");
const profileModal = document.getElementById("profileModal");
const deleteConfirmModal = document.getElementById("deleteConfirmModal");


const cancelFormBtn = document.getElementById("cancelFormBtn");
const saveRowBtn = document.getElementById("saveRowBtn");

const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

const profileBtn = document.getElementById("profileBtn");
const closeProfileBtn = document.getElementById("closeProfileBtn");
const saveProfileBtn = document.getElementById("saveProfileBtn");

const profileNameDisplay = document.getElementById("profileNameDisplay");

const inputDateFull = document.getElementById("inputDateFull");
const inputStart = document.getElementById("inputStart");
const inputArrive = document.getElementById("inputArrive");

const inputKm = document.getElementById("inputKm");

const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");


/* =========================
MODAL
========================= */

function openModal(modal){
    modal.style.display = "flex";
}

function closeModal(modal){
    modal.style.display = "none";
}

window.openFirstAdd = function(){

    clearForm();

    openModal(formModal);

}

/* =========================
HELPERS
========================= */

function generateId(){
    return "ID_" + Date.now();
}

function formatRupiah(value){
    value = String(value).replace(/\D/g,"");
    if(value==="") return "";
    return "Rp " +
    Number(value).toLocaleString("id-ID");
}

function parseRupiah(value){
    return Number(
        String(value)
        .replace(/[^\d]/g,"") || 0
    );
}

function extractDate(dateFull){

    if(!dateFull) return "";

    let d = new Date(dateFull);

    if(isNaN(d)){
        return "";
    }

    return d.getDate();

}
/* =========================
SAVE LAST PERIOD
========================= */

function saveLastPeriod(){

    localStorage.setItem(
        "lastMonth",
        monthSelect.value
    );

    localStorage.setItem(
        "lastYear",
        yearSelect.value
    );

}

function loadLastPeriod(){

    let lastMonth =
    localStorage.getItem("lastMonth");

    let lastYear =
    localStorage.getItem("lastYear");

    if(lastMonth){
        monthSelect.value = lastMonth;
    }

    if(lastYear){
        yearSelect.value = lastYear;
    }

}
/* =========================
INPUT FORMAT
========================= */

inputFlazz.addEventListener("input",()=>{
    inputFlazz.value =
    formatRupiah(inputFlazz.value);
});

inputCash.addEventListener("input",()=>{
    inputCash.value =

});


/* =========================
API FUNCTIONS
========================= */

async function fetchSpreadsheetData(){

    try{

        const response =
        await fetch(API_URL);

        const data =
        await response.json();

        tableData = data;
        console.log(data);
        applyPeriodFilter();

    }catch(error){

        console.log(error);

        alert("Gagal mengambil data spreadsheet");

    }

}


async function sendApi(data){

    try{

        await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify(data)

        });

        return true;

    }catch(error){

        console.log(error);

        alert("Koneksi gagal");

        return false;

    }

}


/* =========================
PERIOD FILTER
========================= */

function applyPeriodFilter(){

    let month = monthSelect.value;
    let year = yearSelect.value;

    if(!month || !year){

        renderTable();
        return;
    }

    const bulanMap = {

        Januari:1,
        Februari:2,
        Maret:3,
        April:4,
        Mei:5,
        Juni:6,
        Juli:7,
        Agustus:8,
        September:9,
        Oktober:10,
        November:11,
        Desember:12

    };

    let filtered =
    tableData.filter(item=>{

        let d =
        new Date(item.dateFull);

        let m =
        d.getMonth() + 1;

        let y =
        d.getFullYear();

        return (
            m===bulanMap[month]
            &&
            y===Number(year)
        );

    });

    renderTable(filtered);

}


/* =========================
SUBTOTAL
========================= */

function updateSubtotal(data){

    let total = 0;

    data.forEach(item=>{

        total += Number(item.total);

    });

    subtotalValue.textContent =
    "Rp " +
    total.toLocaleString("id-ID");

}


/* =========================
RENDER TABLE
========================= */

function renderTable(data = tableData){

    if(data.length===0){

    tableBody.innerHTML = `

    <tr id="placeholderRow">

        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="hidden-datefull">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>
        <td class="placeholder">-</td>

        <td class="action-cell">

            <button
                onclick="openFirstAdd()"
                class="action-btn">✏️</button>

        </td>

    </tr>`;

    updateSubtotal([]);

    return;
}
    data.sort((a,b)=>
        new Date(a.dateFull)
        -
        new Date(b.dateFull)
    );

    let grouped = {};
    let dateTotals = {};
    let html = "";

    data.forEach((row,index)=>{

        if(!grouped[row.dateFull]){
            grouped[row.dateFull] = [];
        }

        grouped[row.dateFull].push({
            ...row,
            index:index
        });

    });

    Object.keys(grouped)
    .forEach(dateKey=>{

        let total = 0;

        grouped[dateKey]
        .forEach(row=>{

            total +=
            Number(row.flazz || 0);

            total +=
            Number(row.cash || 0);

        });

        dateTotals[dateKey] = total;

    });

    Object.keys(grouped)
.forEach((dateKey, groupIndex)=>{

    let rows = grouped[dateKey];

    // warna selang-seling per tanggal
    let rowClass =
    groupIndex % 2 === 0
    ? "group-even"
    : "group-odd";

    rows.forEach((row,rowIndex)=>{

            let nomor = rowIndex + 1;

            html += `<tr class="${rowClass}">`;

            if(rowIndex===0){

                html += `
                <td class="date-cell"
                    rowspan="${rows.length}">
                    ${extractDate(row.dateFull)}
                </td>`;

            }

            html += `
            <td class="no-cell">${nomor}</td>
            `;

            if(rowIndex===0){

                html += `
                <td class="hidden-datefull"
                    rowspan="${rows.length}">
                    ${row.dateFull}
                </td>`;

            }

            html += `

<td class="center-cell">${row.start}</td>
<td class="center-cell">${row.arrive}</td>
<td class="center-cell">${row.parking}</td>

<td class="money-cell">
${row.flazz===0 ? "" : formatRupiah(row.flazz)}
</td>

<td class="money-cell">
${row.cash===0 ? "" : formatRupiah(row.cash)}
</td>

<td class="center-cell">${row.km}</td>

`;

/* ===== LANJUTAN renderTable() ===== */

            html += `

${rowIndex===0 ? `
<td class="total-cell"
    rowspan="${rows.length}">
${dateTotals[row.dateFull]===0
? ""
: formatRupiah(dateTotals[row.dateFull])}
</td>
` : ""}

<td class="action-cell">

<div class="action-wrap">

<button onclick="editRow('${row.id}')"
        class="action-btn">✏️</button>

<button onclick="askDelete('${row.id}')"
        class="action-btn">🗑️</button>

<button onclick="addNewRow('${row.id}')"
        class="action-btn">➕</button>

</div>

</td>
`;

        });

    });

    tableBody.innerHTML = html;

    updateSubtotal(data);

}


/* =========================
FORM HELPERS
========================= */

function clearForm(){

    inputDateFull.value = "";
    inputStart.value = "";
    inputArrive.value = "";
    inputParking.value = "";
    inputFlazz.value = "";
    inputCash.value = "";
    inputKm.value = "";

    editIndex = null;
    addBelowIndex = null;

}


function validateForm(){

    let lokasi =
    inputStart.value.trim() ||
    inputArrive.value.trim() ||
    inputParking.value.trim();

    let biaya =
    parseRupiah(inputFlazz.value) ||
    parseRupiah(inputCash.value);

    if(!inputDateFull.value){
        alert("Date wajib diisi");
        return false;
    }

    if(!lokasi){
        alert("Isi Start / Arrive / Parking");
        return false;
    }

    if(!biaya){
        alert("Isi Flazz / Cash");
        return false;
    }

    return true;

}


/* =========================
SAVE ROW
========================= */

saveRowBtn.onclick = async ()=>{

    if(!validateProfilePeriod()) return;
    if(!validateForm()) return;
    
    saveLastPeriod();

    let confirmSave =
    confirm("Data sudah benar?");

    if(!confirmSave) return;

    let flazz =
    parseRupiah(inputFlazz.value);

    let cash =
    parseRupiah(inputCash.value);

    let data = {

        id:
        editIndex
        ?
        editIndex
        :
        generateId(),

        dateFull:
        inputDateFull.value,

        start:
        inputStart.value,

        arrive:
        inputArrive.value,

        parking:
        inputParking.value,

        flazz: flazz,
        cash: cash,
        km: inputKm.value

    };


    /* UPDATE */

    if(editIndex){

        data.action = "update";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    /* ADD */

    else{

        data.action = "add";

        let ok =
        await sendApi(data);

        if(ok){

            await fetchSpreadsheetData();

        }

    }

    clearForm();

    closeModal(formModal);

};


/* =========================
EDIT
========================= */

window.editRow = function(id){

    let row =
    tableData.find(
        x => x.id === id
    );

    if(!row) return;

    editIndex = id;

    inputDateFull.value =
    row.dateFull;

    inputStart.value =
    row.start;

    inputArrive.value =
    row.arrive;

    inputParking.value =
    row.parking;

    inputFlazz.value =
    formatRupiah(row.flazz);

    inputCash.value =
    formatRupiah(row.cash);

    inputKm.value =
    row.km;

    openModal(formModal);

}


/* =========================
ADD BELOW
========================= */

window.addNewRow = function(id){

    clearForm();

    editIndex = null;
    addBelowIndex = id;

    openModal(formModal);

}


/* =========================
DELETE
========================= */

window.askDelete = function(id){

    deleteIndex = id;

    openModal(deleteConfirmModal);

}


confirmDeleteBtn.onclick =
async ()=>{

    if(!deleteIndex) return;

    let ok =
    await sendApi({

        action:"delete",
        id:deleteIndex

    });

    if(ok){

        await fetchSpreadsheetData();

    }

    deleteIndex = null;

    closeModal(
        deleteConfirmModal
    );

}


cancelDeleteBtn.onclick = ()=>{

    closeModal(
        deleteConfirmModal
    );

}


/* =========================
PROFILE
========================= */

function setProfileLock(lock){

    profileLocked = lock;

    document.getElementById(
    "employeeName").readOnly = lock;

    document.getElementById(
    "employeeNik").readOnly = lock;

    document.getElementById(
    "employeeUser").readOnly = lock;

    document.getElementById(
    "employeeLocation").readOnly = lock;

    saveProfileBtn.textContent =
    lock ? "Edit" : "Save";

}


function saveProfile(){

    let name =
    document.getElementById(
    "employeeName").value.trim();

    let nik =
    document.getElementById(
    "employeeNik").value.trim();

    let user =
    document.getElementById(
    "employeeUser").value.trim();

    let car =
    document.getElementById(
    "employeeLocation").value.trim();

    localStorage.setItem(
    "employeeName",name);

    localStorage.setItem(
    "employeeNik",nik);

    localStorage.setItem(
    "employeeUser",user);

    localStorage.setItem(
    "employeeCar",car);

    profileNameDisplay.textContent =
    name;

    setProfileLock(true);

}


function loadProfile(){

    let name =
    localStorage.getItem(
    "employeeName") || "";

    let nik =
    localStorage.getItem(
    "employeeNik") || "";

    let user =
    localStorage.getItem(
    "employeeUser") || "";

    let car =
    localStorage.getItem(
    "employeeCar") || "";

    document.getElementById(
    "employeeName").value = name;

    document.getElementById(
    "employeeNik").value = nik;

    document.getElementById(
    "employeeUser").value = user;

    document.getElementById(
    "employeeLocation").value = car;

    profileNameDisplay.textContent =
    name;

    if(name){
        setProfileLock(true);
    }

}


/* =========================
VALIDATE PROFILE
========================= */

function validateProfilePeriod(){

    let name =
    localStorage.getItem(
    "employeeName");

    let nik =
    localStorage.getItem(
    "employeeNik");

    let user =
    localStorage.getItem(
    "employeeUser");

    let car =
    localStorage.getItem(
    "employeeCar");

    if(!name || !nik || !user || !car){

        alert(
        "Profile belum lengkap");

        return false;
    }

    if(!monthSelect.value ||
       !yearSelect.value){

        alert(
        "Pilih period");

        return false;
    }

    return true;

}

    document.getElementById("saveProfileBtn")
    .onclick = ()=>{

        if(profileLocked){
            setProfileLock(false);
            return;
        }

        saveProfile();
        closeModal(profileModal);
    };

    document.getElementById("profileBtn")
    .onclick = ()=>{
        loadProfile();
        openModal(profileModal);
    };

    document.getElementById("closeProfileBtn")
    .onclick = ()=>{
        closeModal(profileModal);
    };

    loadProfile();
    loadLastPeriod();
    await fetchSpreadsheetData();
    applyPeriodFilter();
}
